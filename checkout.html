<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Checkout — SPICE ROUTE</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--fire:#e8621c;--gold:#d4960f;--dark:#0d0b08;--card:#181410;--card2:#221c16;--card3:#2a2118;--border:rgba(255,255,255,0.08);--text:#f2ead8;--muted:#8a7a65;--green:#3dba7a}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--fire)}
.nav{position:fixed;top:0;left:0;right:0;z-index:999;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 52px;background:rgba(13,11,8,0.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;color:var(--gold);letter-spacing:3px}.logo span{color:var(--fire);font-style:italic}
.nav-links{display:flex;gap:2px}.nav-links a{color:var(--muted);font-size:0.75rem;font-weight:500;letter-spacing:1px;text-transform:uppercase;padding:8px 16px;border-radius:6px;transition:all .2s}.nav-links a:hover{background:var(--card2);color:var(--text)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-cart{background:var(--fire);color:#fff;padding:9px 22px;border-radius:8px;font-size:0.78rem;font-weight:700;display:flex;align-items:center;gap:8px}
.cart-badge{background:var(--gold);color:#000;border-radius:20px;min-width:18px;height:18px;font-size:0.65rem;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 4px}
.nav-signin{border:1px solid var(--border);color:var(--text);padding:8px 18px;border-radius:7px;font-size:0.75rem;font-weight:500}
.wrap{padding:106px 52px 80px;min-height:100vh}
.steps{display:flex;align-items:center;gap:8px;margin-bottom:32px;flex-wrap:wrap}
.step{display:flex;align-items:center;gap:8px;font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700}
.step.active{color:var(--text)}.step.done{color:var(--green)}
.sn{width:26px;height:26px;border-radius:50%;background:var(--card2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:800}
.step.active .sn{background:var(--fire);border-color:var(--fire);color:#fff}
.step.done .sn{background:var(--green);border-color:var(--green);color:#fff}
.sline{width:36px;height:1px;background:var(--border)}
.pg-title{font-family:'Playfair Display',serif;font-size:2.3rem;font-weight:900;margin-bottom:28px}
.layout{display:grid;grid-template-columns:1fr 360px;gap:28px;align-items:start}
.block{margin-bottom:28px}
.block-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;margin-bottom:15px;padding-bottom:11px;border-bottom:1px solid var(--border)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fl{font-size:0.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.fi{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:0.86rem;outline:none;transition:border-color .2s;width:100%}
.fi:focus{border-color:var(--fire)}.fi::placeholder{color:var(--muted);opacity:.5}
.pay-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.popt{background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:18px 10px;text-align:center;cursor:pointer;transition:all .2s}
.popt:hover,.popt.sel{border-color:var(--fire);background:rgba(232,98,28,0.1)}
.popt-icon{font-size:2rem;margin-bottom:6px}
.popt-lbl{font-size:0.72rem;font-weight:700;color:var(--muted)}.popt.sel .popt-lbl{color:var(--fire)}
.panel{background:var(--card);border:1px solid var(--border);border-radius:17px;padding:24px;position:sticky;top:86px}
.panel-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;margin-bottom:18px}
.coitem{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.coitem-emoji{width:46px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;background:var(--card2);border-radius:8px;flex-shrink:0}
.coitem-name{font-size:0.82rem;font-weight:600;flex:1}
.coitem-qty{font-size:0.68rem;color:var(--muted)}
.coitem-price{font-size:0.9rem;font-weight:700;color:var(--gold);flex-shrink:0}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0}
.prow{display:flex;justify-content:space-between;font-size:0.83rem;margin-bottom:9px}.prow .lbl{color:var(--muted)}
.ptotal{display:flex;justify-content:space-between;font-size:1.05rem;font-weight:700}.ptotal span:last-child{color:var(--gold);font-size:1.2rem}
.btn-fire{background:var(--fire);color:#fff;border:none;padding:14px;border-radius:10px;font-size:0.9rem;font-weight:700;width:100%;transition:all .25s;display:block;text-align:center;margin-top:10px;cursor:pointer}
.btn-fire:hover{background:#cc5418;transform:translateY(-1px);box-shadow:0 8px 22px rgba(232,98,28,0.3)}
.btn-outline{background:none;color:var(--text);border:1px solid rgba(255,255,255,0.18);padding:12px 28px;border-radius:10px;font-size:0.84rem;font-weight:500;display:inline-flex;align-items:center;gap:8px;transition:all .25s;cursor:pointer}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
/* SUCCESS */
.success-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 24px 60px}
.success-ring{width:120px;height:120px;border-radius:50%;background:rgba(61,186,122,0.12);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:3.5rem;margin:0 auto 28px;animation:popIn .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:900;margin-bottom:10px}
.success-sub{color:var(--muted);font-size:0.95rem;margin-bottom:40px;max-width:440px;line-height:1.7}
.order-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;max-width:440px;width:100%;margin:0 auto 32px;text-align:left}
.ob-label{font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.ob-id{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--gold);margin-bottom:5px}
.track{display:flex;flex-direction:column}
.tstep{display:flex;gap:14px}.tdcol{display:flex;flex-direction:column;align-items:center}
.td{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);margin-top:3px;flex-shrink:0}
.td.done{background:var(--green);border-color:var(--green)}.td.active{background:var(--fire);border-color:var(--fire);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,98,28,.4)}50%{box-shadow:0 0 0 8px rgba(232,98,28,0)}}
.tl{width:2px;flex:1;min-height:26px;background:var(--border)}.tl.done{background:var(--green)}
.ti{padding-bottom:18px}.ti-label{font-size:0.85rem;font-weight:600;margin-bottom:2px}.ti-time{font-size:0.68rem;color:var(--muted)}
.toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--fire);border-radius:10px;padding:12px 18px;display:flex;gap:10px;align-items:center;box-shadow:0 8px 28px rgba(0,0,0,.6);animation:tIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes tIn{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}.toast-msg{font-size:0.8rem;font-weight:500}
@media(max-width:900px){.nav{padding:0 16px}.nav-links{display:none}.wrap{padding:86px 16px 50px}.layout{grid-template-columns:1fr}.panel{position:static}.frow{grid-template-columns:1fr}}
</style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5M9LW2MB"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
<nav class="nav">
  <a href="index.html" class="logo">SPICE <span>ROUTE</span></a>
  <div class="nav-links"><a href="index.html">Home</a><a href="menu.html">Menu</a><a href="about.html">About</a><a href="contact.html">Contact</a></div>
  <div class="nav-right">
    <a href="profile.html" class="nav-signin" id="signinBtn">Sign In</a>
    <a href="cart.html" class="nav-cart">🛒 Cart <span class="cart-badge" id="cartBadge">0</span></a>
  </div>
</nav>
<div class="wrap" id="mainWrap"></div>
<div class="toasts" id="toasts"></div>
<script>
const MENU_MAP={1:{name:'Hyderabadi Dum Biryani',emoji:'🍛',price:299},2:{name:'Mutton Biryani Royal',emoji:'🍛',price:369},3:{name:'Paneer Dum Biryani',emoji:'🍛',price:269},4:{name:'Chicken Zafrani Biryani',emoji:'🍛',price:319},5:{name:'Chicken 65',emoji:'🍗',price:249},6:{name:'Paneer Tikka',emoji:'🧆',price:199},7:{name:'Seekh Kebab',emoji:'🌮',price:279},8:{name:'Samosa Chaat',emoji:'🥟',price:119},9:{name:'Hyderabadi Haleem',emoji:'🥘',price:279},10:{name:'Butter Chicken',emoji:'🍲',price:299},11:{name:'Dal Makhani',emoji:'🫕',price:219},12:{name:'Mutton Rogan Josh',emoji:'🍲',price:349},13:{name:'Palak Paneer',emoji:'🥬',price:229},14:{name:'Butter Naan',emoji:'🫓',price:49},15:{name:'Garlic Naan',emoji:'🫓',price:59},16:{name:'Roomali Roti',emoji:'🥙',price:39},17:{name:'Parotta',emoji:'🫓',price:45},18:{name:'Gulab Jamun',emoji:'🍮',price:89},19:{name:'Double Ka Meetha',emoji:'🍞',price:99},20:{name:'Phirni',emoji:'🍚',price:79},21:{name:'Mango Lassi',emoji:'🥭',price:79},22:{name:'Masala Chai',emoji:'🫖',price:49},23:{name:'Rose Sharbat',emoji:'🌹',price:69}};
let payMethod='card';
function getCart(){try{return JSON.parse(localStorage.getItem('sr_cart')||'{}')}catch{return{}}}
function cartTotal(){const c=getCart();return Object.entries(c).reduce((s,[id,q])=>{const it=MENU_MAP[id];return s+(it?it.price*q:0)},0)}
function cartCt(){return Object.values(getCart()).reduce((a,b)=>a+b,0)}
function updateBadge(){document.querySelectorAll('.cart-badge').forEach(e=>e.textContent=cartCt())}
function toast(msg){const w=document.getElementById('toasts');const t=document.createElement('div');t.className='toast';t.innerHTML=`<span>⚠️</span><div class="toast-msg">${msg}</div>`;w.appendChild(t);setTimeout(()=>{t.style.transition='all .3s';t.style.opacity='0';setTimeout(()=>t.remove(),300)},2400)}
function setPay(m){payMethod=m;renderCheckout()}
function renderPayFields(){
  const el=document.getElementById('payFields');if(!el)return;
  if(payMethod==='card'){el.innerHTML=`<div style="display:grid;gap:10px;margin-top:12px"><div class="fg" style="margin-bottom:0"><label class="fl">Card Number</label><input class="fi" placeholder="4242 4242 4242 4242" maxlength="19"></div><div class="frow"><div class="fg" style="margin-bottom:0"><label class="fl">Expiry</label><input class="fi" placeholder="MM / YY"></div><div class="fg" style="margin-bottom:0"><label class="fl">CVV</label><input class="fi" placeholder="•••" type="password" maxlength="4"></div></div></div>`;}
  else if(payMethod==='upi'){el.innerHTML=`<div style="margin-top:12px"><div class="fg" style="margin-bottom:0"><label class="fl">UPI ID</label><input class="fi" placeholder="yourname@ybl"></div></div>`;}
  else{const t=cartTotal()+49+Math.round(cartTotal()*.05);el.innerHTML=`<div style="margin-top:12px;padding:14px;background:rgba(61,186,122,0.08);border:1px solid rgba(61,186,122,0.2);border-radius:10px;font-size:0.82rem;color:var(--muted)">💵 Pay ₹${t} cash to delivery partner on arrival.</div>`;}
}
function placeOrder(){
  const fn=document.getElementById('fn')?.value.trim(),ph=document.getElementById('ph')?.value.trim(),addr=document.getElementById('addr')?.value.trim();
  if(!fn||!ph||!addr){toast('Please fill all delivery details');return;}
  const orderId='#SR-'+Math.floor(1000+Math.random()*9000);
  const total=cartTotal()+49+Math.round(cartTotal()*.05);
  localStorage.removeItem('sr_cart');updateBadge();showSuccess(fn,orderId,total);
}
function showSuccess(name,orderId,total){
  document.getElementById('mainWrap').innerHTML=`<div class="success-page">
    <div class="success-ring">🎉</div>
    <h1 class="success-title">Order Placed!</h1>
    <p class="success-sub">Thank you, <strong>${name}</strong>! Your food is being prepared with love and fire.<br>Estimated delivery: <strong style="color:var(--gold)">28–35 minutes</strong></p>
    <div class="order-box">
      <div class="ob-label">Order ID</div><div class="ob-id">${orderId}</div>
      <div style="font-size:0.83rem;color:var(--muted);margin-bottom:22px">Total paid: ₹${total}</div>
      <div class="track">
        <div class="tstep"><div class="tdcol"><div class="td done"></div><div class="tl done"></div></div><div class="ti"><div class="ti-label">✅ Order Received</div><div class="ti-time">Just now</div></div></div>
        <div class="tstep"><div class="tdcol"><div class="td active"></div><div class="tl"></div></div><div class="ti"><div class="ti-label">🍳 Preparing your food</div><div class="ti-time">Est. 15 min</div></div></div>
        <div class="tstep"><div class="tdcol"><div class="td"></div><div class="tl"></div></div><div class="ti"><div class="ti-label">🛵 Out for delivery</div><div class="ti-time">Est. 10 min</div></div></div>
        <div class="tstep"><div class="tdcol"><div class="td"></div></div><div class="ti"><div class="ti-label">🏠 Delivered</div><div class="ti-time">Enjoy your meal!</div></div></div>
      </div>
    </div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <a href="index.html" class="btn-outline">🏠 Back to Home</a>
      <a href="profile.html" class="btn-outline">📦 View My Orders</a>
    </div>
  </div>`;
}
function renderCheckout(){
  const c=getCart();const items=Object.entries(c).map(([id,qty])=>({id:+id,...MENU_MAP[id],qty})).filter(i=>i.name);
  if(!items.length){document.getElementById('mainWrap').innerHTML=`<div style="text-align:center;padding:80px 0"><div style="font-size:4rem;margin-bottom:18px">🛒</div><div style="font-family:'Playfair Display',serif;font-size:2rem;margin-bottom:16px">Nothing to checkout</div><a href="menu.html" class="btn-fire" style="display:inline-block;width:auto;padding:13px 32px">Browse Menu</a></div>`;return;}
  const sub=cartTotal(),delivery=49,tax=Math.round(sub*.05),total=sub+delivery+tax;
  document.getElementById('mainWrap').innerHTML=`
    <div class="steps">
      <div class="step done"><div class="sn">✓</div>Cart</div><div class="sline"></div>
      <div class="step active"><div class="sn">2</div>Delivery & Payment</div><div class="sline"></div>
      <div class="step"><div class="sn">3</div>Confirmation</div>
    </div>
    <h1 class="pg-title">Checkout</h1>
    <div class="layout">
      <div>
        <div class="block">
          <div class="block-title">📍 Delivery Details</div>
          <div class="frow"><div class="fg"><label class="fl">First Name</label><input class="fi" id="fn" placeholder="Arjun"></div><div class="fg"><label class="fl">Last Name</label><input class="fi" placeholder="Reddy"></div></div>
          <div class="fg"><label class="fl">Phone</label><input class="fi" id="ph" placeholder="+91 98765 43210" type="tel"></div>
          <div class="fg"><label class="fl">Email</label><input class="fi" placeholder="you@example.com" type="email"></div>
          <div class="fg"><label class="fl">Full Address</label><input class="fi" id="addr" placeholder="Flat/Plot, Building, Street Name"></div>
          <div class="frow"><div class="fg"><label class="fl">Area</label><input class="fi" placeholder="Banjara Hills"></div><div class="fg"><label class="fl">PIN Code</label><input class="fi" placeholder="500034"></div></div>
        </div>
        <div class="block">
          <div class="block-title">💳 Payment Method</div>
          <div class="pay-grid">
            <div class="popt ${payMethod==='card'?'sel':''}" onclick="setPay('card')"><div class="popt-icon">💳</div><div class="popt-lbl">Card</div></div>
            <div class="popt ${payMethod==='upi'?'sel':''}" onclick="setPay('upi')"><div class="popt-icon">📱</div><div class="popt-lbl">UPI</div></div>
            <div class="popt ${payMethod==='cash'?'sel':''}" onclick="setPay('cash')"><div class="popt-icon">💵</div><div class="popt-lbl">Cash</div></div>
          </div>
          <div id="payFields"></div>
        </div>
        <button class="btn-fire" style="font-size:0.95rem;padding:15px" onclick="placeOrder()">🎉 Place Order — ₹${total}</button>
      </div>
      <div><div class="panel">
        <div class="panel-title">Order Review</div>
        ${items.map(it=>`<div class="coitem"><div class="coitem-emoji">${it.emoji}</div><div><div class="coitem-name">${it.name}</div><div class="coitem-qty">×${it.qty}</div></div><div class="coitem-price">₹${it.price*it.qty}</div></div>`).join('')}
        <div class="divider"></div>
        <div class="prow"><span class="lbl">Subtotal</span><span>₹${sub}</span></div>
        <div class="prow"><span class="lbl">Delivery</span><span>₹${delivery}</span></div>
        <div class="prow"><span class="lbl">GST (5%)</span><span>₹${tax}</span></div>
        <div class="divider"></div>
        <div class="ptotal"><span>Total</span><span>₹${total}</span></div>
        <div style="margin-top:12px;font-size:0.7rem;color:var(--muted)">🔒 Secure & encrypted payment</div>
      </div></div>
    </div>`;
  renderPayFields();
}
const user=JSON.parse(sessionStorage.getItem('sr_user')||'null');
if(user)document.getElementById('signinBtn').textContent='👤 '+user.name.split(' ')[0];
updateBadge();renderCheckout();
</script>
</body>
</html>
